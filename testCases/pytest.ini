[pytest]
# Register custom markers to suppress PytestUnknownMarkWarning
markers =
    regression: Regression test cases
    sanity: Sanity / Smoke test cases
    ddt: Data Driven Test cases

# Command-line default options
addopts = 
    -v
    -s
    --capture=tee-sys
    --strict-markers

# Configure log output format during execution
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter out third-party library warnings (e.g., deprecated pytest-html attributes)
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning